<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ryder — where golfers meet, organise and play</title>
  <meta name="description" content="The social home for golf societies and clubs — find players near you, join a society, organise Ryder Cup style days out and share the results." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316432f'/%3E%3Ctext x='16' y='23' font-size='18' font-family='Georgia,serif' fill='%23a9823a' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E" />
  <!-- iOS / installable home-screen app -->
  <meta name="theme-color" content="#16432f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ryder" />
  <link rel="apple-touch-icon" href="assets/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/fraunces.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/manrope.woff2" crossorigin />
  <link rel="stylesheet" href="assets/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand" data-nav="feed">
        <span class="brand-mark" aria-hidden="true">R</span>
        <div class="brand-text">
          <strong>Ryder</strong>
          <span>meet · organise · play</span>
        </div>
      </div>

      <label class="search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input id="search" type="text" placeholder="Search players, societies, days out…" />
      </label>

      <nav class="tabs" id="tabs" aria-label="Primary">
        <button class="tab is-active" data-nav="feed">Feed</button>
        <button class="tab" data-nav="discover">Discover</button>
        <button class="tab" data-nav="courses">Courses</button>
        <button class="tab" data-nav="events">My days</button>
      </nav>

      <button class="btn new-day" id="newDay">＋ New day</button>
      <button class="me-avatar" id="meAvatar" data-nav="profile" title="Your profile"></button>
    </header>

    <main id="main"><!-- views render here --></main>

    <footer class="appfoot">
      <span>Ryder · the social home for golf societies</span>
      <span class="muted" id="footMeta"></span>
    </footer>

    <!-- App-style bottom navigation (phones only; mirrors the top tabs) -->
    <nav class="botnav" aria-label="Primary">
      <button class="botnav-item tab is-active" data-nav="feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5"/><path d="M6 9.5V20h12V9.5"/></svg>
        <span>Feed</span>
      </button>
      <button class="botnav-item tab" data-nav="discover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="m15 9-1.8 4.2L9 15l1.8-4.2z"/></svg>
        <span>Discover</span>
      </button>
      <button class="botnav-item tab" data-nav="courses">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 21s6.5-5.4 6.5-10.5a6.5 6.5 0 1 0-13 0C5.5 15.6 12 21 12 21z"/><circle cx="12" cy="10.5" r="2.3"/></svg>
        <span>Courses</span>
      </button>
      <button class="botnav-item tab" data-nav="events">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="5.5" width="16" height="15" rx="2"/><path d="M4 10h16M8.5 3.5v4M15.5 3.5v4"/></svg>
        <span>My days</span>
      </button>
    </nav>
  </div>

  <script src="assets/vendor/leaflet/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
