<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryder — where golfers meet, organise and play</title>
  <meta name="description" content="The social home for golf societies and clubs — find players near you, join a society, organise Ryder Cup style days out and share the results." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2316432f'/%3E%3Ctext x='16' y='23' font-size='18' font-family='Georgia,serif' fill='%23a9823a' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E" />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/fraunces.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="assets/fonts/manrope.woff2" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand" data-nav="feed">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 21V4l11 3-11 3" fill="currentColor" stroke="none"/>
            <line x1="5" y1="21" x2="5" y2="3"/>
          </svg>
        </span>
        <div class="brand-text">
          <strong>Ryder</strong>
          <span>meet · organise · play</span>
        </div>
      </div>

      <label class="search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input id="search" type="text" placeholder="Search players, societies, days out…" />
      </label>

      <nav class="tabs" id="tabs" aria-label="Primary">
        <button class="tab is-active" data-nav="feed">Feed</button>
        <button class="tab" data-nav="discover">Discover</button>
        <button class="tab" data-nav="courses">Courses</button>
        <button class="tab" data-nav="events">My days</button>
      </nav>

      <button class="btn new-day" id="newDay">＋ New day</button>
      <button class="me-avatar" id="meAvatar" data-nav="profile" title="Your profile"></button>
    </header>

    <main id="main"><!-- views render here --></main>

    <footer class="appfoot">
      <span>Ryder · the social home for golf societies</span>
      <span class="muted" id="footMeta"></span>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
