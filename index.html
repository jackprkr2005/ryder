<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryder — Organise your own Ryder Cup</title>
  <meta name="description" content="Bring golfers together to organise Ryder Cup style days out — teams, captains, match play and a live scoreboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%E2%9B%B3%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 21V4l11 3-11 3" fill="currentColor" stroke="none"/>
            <line x1="5" y1="21" x2="5" y2="3"/>
          </svg>
        </span>
        <div class="brand-text">
          <strong>Ryder</strong>
          <span>organise your own cup</span>
        </div>
      </div>

      <nav class="tabs" id="tabs" aria-label="Primary">
        <button class="tab is-active" data-view="scoreboard">Scoreboard</button>
        <button class="tab" data-view="matches">Matches</button>
        <button class="tab" data-view="teams">Teams</button>
        <button class="tab" data-view="create">New event</button>
      </nav>

      <div class="event-pill" id="eventPill">
        <span class="dot live"></span>
        <span id="eventPillText">Live event</span>
      </div>
    </header>

    <main id="main"><!-- views render here --></main>

    <footer class="appfoot">
      <span>Ryder · a friendlier way to run your golf day</span>
      <span class="muted" id="footMeta"></span>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
