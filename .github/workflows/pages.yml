name: Deploy preview to GitHub Pages

# Publishes the static (single-player) build of Ryder so it can be clicked
# through from any browser. The multiplayer backend in /server is not part of
# this deploy — Pages serves static files only.

on:
  push:
    branches: ["claude/vigilant-hypatia-oj3z4u"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p dist
          cp index.html styles.css app.js data.js dist/
          # tiny 404 so deep links fall back to the app shell
          cp index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
